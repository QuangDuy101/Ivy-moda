    <main id="main" class="main" style="background-color: #dddce1;">
        <div class="pagetitle">
          <h1>Chỉnh sửa bộ sưu tập</h1>
        </div>
      
        <div class="card">
          <div class="card-body">
            <form id="editCollectionForm">
              <!-- Hàng 1 -->
              <div class="row mt-4 mb-4">
                <div class="col-md-6 d-flex align-items-center position-relative mb-3">
                  <label for="name" class="form-label" style="width: 150px;">Tên bộ sưu tập</label>
                  <input type="text" class="form-control" id="productName" value="SUMMER TINT" style="margin-left: 40px;" disabled>
                  <div class="text-danger small position-absolute" style="top: 100%; left: 162px;" id="error-productName"></div>
                </div>
                <div class="col-md-6 d-flex align-items-center position-relative mb-3">
                  <label for="productCode" class="form-label" style="width: 150px;">Mã bộ sưu tập</label>
                  <input type="text" class="form-control" id="productCode" value="1" disabled>
                  <div class="text-danger small position-absolute" style="top: 100%; left: 130px;" id="error-productCode"></div>
                </div>
              </div>
      
              <!-- Hàng 2 -->
              <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center position-relative mb-3">
                  <div  class="form-label" style="width: 150px; margin-right:90px">Products</div>
                  <!-- <input type="text" class="form-control" id="productPrice" value="1,2,3,4" style="margin-left: 40px;"> -->
                  <!-- <div class="text-danger small position-absolute" style="top: 100%; left: 162px;" id="error-productPrice"></div> -->
                   <div class="d-flex" id="productList" style="gap: 20px;">
                    <div class="collectionProduct" style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer;">
                        <img style="object-fit: cover; width: 100%; height: 100%;" src="assets/images/collection-summertint-10.webp" alt="">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
                            <span style="color: white; font-size: 24px;">-</span>
                        </div>
                    </div>
                    <div class="collectionProduct1" style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer;">
                        <img style="object-fit: cover; width: 100%; height: 100%;" src="assets/images/collection-summertint-11.webp" alt="">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
                            <span style="color: white; font-size: 24px;">-</span>
                        </div>
                    </div>
                    <div class="collectionProduct2" style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer;">
                        <img style="object-fit: cover; width: 100%; height: 100%;" src="assets/images/collection-summertint-12.webp" alt="">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
                            <span style="color: white; font-size: 24px;">-</span>
                        </div>
                    </div>
                    <div class="collectionProduct3" style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; position: relative; cursor: pointer;">
                        <img style="object-fit: cover; width: 100%; height: 100%;" src="assets/images/collection-summertint-13.webp" alt="">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
                            <span style="color: white; font-size: 24px;">-</span>
                        </div>
                    </div>
                    <div style="width: 150px; height: 150px; border-radius: 10px; overflow: hidden; cursor:pointer">
                        <i class="bi bi-plus" style="width: 150px; height: 150px; font-size: 150px; display: flex; justify-content: center; align-items: center; border: 1px dashed #ccc; border-radius: 10px; color: #57585A;"></i>
                    </div>
                   </div>
                </div>
              </div>
      
              <!-- Hàng 5 -->
              <div class="row mb-3">
                <div class="col-md-6 d-flex align-items-center position-relative mb-3">
                  <label for="productImage" class="form-label" style="width: 150px;">Ảnh</label>
                  <input class="form-control" type="file" id="productImage" multiple style="margin-left: 40px;">
                  <div class="text-danger small position-absolute" style="top: 100%; left: 162px;" id="error-productImage"></div>
                </div>
              </div>
      
              <!-- Hàng mô tả -->
              <div class="row mb-3">
                <label for="about" class="col-md-4 col-lg-3 col-form-label" style="width: 150px;">Mô tả</label>
                <div class="col-md-8 col-lg-9 position-relative mb-3" style="width: 1059px; ">
                  <textarea class="tinymce-editor" disabled>
                                          <p>Lấy cảm hứng từ những đóa hoa xuân nở rộ, BST lần này thể hiện tinh thần tôn vinh tính nữ qua loạt thiết kế nhã nhặn dành riêng cho các quý cô công sở hiện đại! Giờ đây, vẻ đẹp của người phụ nữ không chỉ thể hiện qua đường nét uyển chuyển mà còn đến từ cảm giác tự tin, thoải mái khi nàng được khoác lên mình những bộ cánh xinh đẹp nhất. Với gam tím chủ đạo được làm mới với đủ sắc thái từ nhẹ nhàng đến những tông trầm sâu lắng, các thiết kế trong BST Lilas Dream mang phong cách tối giản nhưng vẫn đem đến dấu ấn khó phai nhờ phom dáng chỉn chu và đường may vô cùng tinh xảo.
                                      </p>
                  </textarea>
                  <div class="text-danger small position-absolute" style="top: 100%; left: 130px;" id="error-productDescription"></div>
                </div>
                
              </div>
      
              <!-- Nút cập nhật -->
              <div class="d-flex justify-content-end">
                <a href="admin-collection-list.html" class="btn btn-primary btn-update-product">Quay lại</a>
              </div>
