  <link rel="stylesheet" href="assets/dashboard/css/manage-product.css" />
  <title>Quản lý sản phẩm</title>
</head>

<body>
  <header class="header">
    <div class="inner-logo"> <a href="/"><span>IVY</span><span>Moda </span></a></div>
    <div class="inner-wrap">
      <div class="inner-notify"> <img src="assets/dashboard/images/icon-bell.svg" /><span>6</span></div>
      <div class="inner-account">
        <div class="inner-avatar"> <img src="assets/dashboard/images/admin.jpg" /></div>
        <div class="inner-text">
          <div class="inner-name">Ngo Quang Ha</div>
          <div class="inner-role">Admin</div>
        </div>
      </div>
      <button class="inner-menu-mobile">
        <i class="fa-solid fa-bars"></i></button>
    </div>
  </header>
  <nav class="sider">
    <ul class="inner-menu">
      <li> <a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> Tổng quan</a></li>
      <li><a href=""><i class="fa-solid fa-table"></i> Quản lý bộ sưu tập</a></li>
      <li><a class="active" href="manage-product.html"><i class="fa-solid fa-table-list"></i> Quản lý sản phẩm</a></li>
      <li><a href=""><i class="fa-solid fa-list-check"></i> Quản lý đơn hàng</a></li>
      <li><a href=""><i class="fa-solid fa-user"></i> Quản lý người dùng</a></li>
    </ul>
    <hr />
    <ul class="inner-menu">
      <li><a href="setting-list.html"><i class="fa-solid fa-gear"></i> Cài đặt chung</a></li>
      <li><a class="inner-logout" href="#"><i class="fa-solid fa-power-off"></i> Đăng xuất </a></li>
    </ul>
  </nav>
  <div class="sider-overlay"></div>
  <main class="main" style="font-family: 'Open Sans', sans-serif;">
    <h1 class="box-title">Quản lý sản phẩm</h1>
    <section class="section">
      <div class="row">
        <div class="col-lg-12">
          <div class="card">
            <div class="card-body">
              <!-- Tìm kiếm và chọn số sản phẩm / trang -->
              <div class="row mt-4 mb-4">
                <div class="col-md-2 d-flex align-items-center">
                  <select id="itemsPerPage" class="form-select" style="max-width: 70px;">
                    <option value="5"selected>5 </option>
                    <option value="10">10 </option>
                    <option value="20">20 </option>
                    <option value="all">Tất cả</option>
                  </select>
                  <span class="ms-2"> Số sản phẩm</span>
                </div>
                <div class="col-md-5 d-flex align-items-center">
                  <!-- Bộ lọc danh mục -->
                  <select id="categoryFilter" class="form-select me-2" style="max-width: 150px;">
                    <option value="">Danh mục</option>
                    <option value="Thời trang">Thời trang</option>
                    <option value="Phụ kiện">Phụ kiện</option>
                    <!-- Có thể thêm danh mục khác -->
                  </select>
                  <!-- Bộ lọc trạng thái -->
                  <select id="statusFilter" class="form-select me-2" style="max-width: 150px;">
                    <option value="">Trạng thái</option>
                    <option value="Còn hàng">Còn hàng</option>
                    <option value="Hết hàng">Hết hàng</option>
                  </select>
                  <!-- Bộ lọc ngày tạo (demo) -->
                  <input type="date" id="dateFilter" class="form-control" style="max-width: 200px;" />
                </div>
                <div class="col-md-5 d-flex">
                  <div class="col-md-7">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Tìm sản phẩm..." >
                  </div>
                  <div class="col-md-5 text-end">
                    <a href="add-product.html" class="btn btn-primary">+ Thêm sản phẩm</a>
                  </div>
                </div>



              </div>

              <!-- Danh sách sản phẩm -->
              <div class="row" id="productContainer"></div>

              <!-- Phân trang -->
              <nav>
                <ul class="pagination justify-content-center mt-4" id="pagination"></ul>
              </nav>
            </div>


          </div>
        </div>
      </div>
      </div>
    </section>
    
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>

    src="https://unpkg.com/filepond-plugin-file-validate-type/dist/filepond-plugin-file-validate-type.js"> </script>
  <script src="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.js"> </script>
  <script src="https://unpkg.com/filepond@^4/dist/filepond.js"> </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"> </script>
  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"> </script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"> </script>
  <script src="assets/dashboard/js/nqh-script.js"> </script>
  <script src="assets/dashboard/js/products-list.js"> </script>
</body>

</html>
