  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet"
    href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.css" />
  <link rel="stylesheet" href="https://unpkg.com/filepond@^4/dist/filepond.css" />
  <script src="https://cdn.tiny.cloud/1/k3k9lsufqjlaa9zf5k2byf3r904v6q7c3iltpkq7w4n7ohvr/tinymce/7/tinymce.min.js"
    referrerpolicy="origin"></script>

  <link rel="stylesheet" href="assets/dashboard/css/style.css" />
  <title>Tạo nhóm quyền</title>
</head>

<body>
  <header class="header">
    <div class="inner-logo"> <a href="/"><span>IVY</span><span>Moda </span></a></div>
    <div class="inner-wrap">
      <div class="inner-notify"> <img src="assets/dashboard/images/icon-bell.svg" /><span>6</span></div>
      <div class="inner-account">
        <div class="inner-avatar"> <img src="assets/dashboard/images/admin.jpg" /></div>
        <div class="inner-text">
          <div class="inner-name">Ngo Quang Ha</div>
          <div class="inner-role">Admin</div>
        </div>
      </div>
      <button class="inner-menu-mobile">
        <i class="fa-solid fa-bars"></i></button>
    </div>
  </header>
  <nav class="sider">
    <ul class="inner-menu">
      <li> <a href="/dashboard.html"><i class="fa-solid fa-gauge-high"></i> Tổng quan</a></li>
      <li><a href="/admin-collection-list.html"><i class="fa-solid fa-table"></i> Quản lý bộ sưu tập</a>
      </li>
      <li><a href="/manage-product.html"><i class="fa-solid fa-table-list"></i> Quản lý sản phẩm</a></li>
      <li><a href="/order-manager.html"><i class="fa-solid fa-list-check"></i> Quản lý đơn hàng</a></li>
      <li><a href="/quanLyNguoiDung.html"><i class="fa-solid fa-user"></i> Quản lý người dùng</a></li>
      <li><a href="reviews-comment.html"><i class="fa-solid fa-comment"></i> Xem reviews</a></li>
    </ul>
    <hr />
    <ul class="inner-menu">
      <li><a href="setting-list.html" class="active"><i class="fa-solid fa-gear"></i> Cài đặt chung</a></li>
      <li><a class="inner-logout" href="#"><i class="fa-solid fa-power-off"></i> Đăng xuất </a></li>
    </ul>
  </nav>
  <div class="sider-overlay"></div>
  <main class="main">
    <h1 class="box-title">Tạo nhóm quyền</h1>
    <div class="section-8">
      <form action="" id="role-create-form">
        <div class="inner-group">
          <label class="inner-label" for="name">Tên nhóm quyền</label>
          <input type="text" id="name" name="name" />
        </div>
        <div class="inner-group">
          <label class="inner-label" for="description">Mô tả ngắn</label>
          <input type="text" id="description" name="description" />
        </div>
        <div class="inner-group">
          <label class="inner-label">Phân quyền</label>
          <div class="inner-checkbox-list">
            <div class="inner-checkbox-item">
              <input class="custom-check" type="checkbox" id="location1" name="locations" />
              <label class="custom-icon-checkbox" for="location1"><i class="fa-solid fa-check"></i></label>
              <label class="inner-locations" for="location1">Xem trang Tổng quan</label>
            </div>
            <div class="inner-checkbox-item">
              <input class="custom-check" type="checkbox" id="location2" name="locations" />
              <label class="custom-icon-checkbox" for="location2"><i class="fa-solid fa-check"></i></label>
              <label class="inner-locations" for="location2">Xem sản phẩm</label>
            </div>
            <div class="inner-checkbox-item">
              <input class="custom-check" type="checkbox" id="location3" name="locations" />
              <label class="custom-icon-checkbox" for="location3"><i class="fa-solid fa-check"></i></label>
              <label class="inner-locations" for="location3">Tạo sản phẩm</label>
            </div>
            <div class="inner-checkbox-item">
              <input class="custom-check" type="checkbox" id="location4" name="locations" />
              <label class="custom-icon-checkbox" for="location4"><i class="fa-solid fa-check"></i></label>
              <label class="inner-locations" for="location4">Sửa sản phẩm</label>
            </div>
            <div class="inner-checkbox-item">
              <input class="custom-check" type="checkbox" id="location5" name="locations" />
              <label class="custom-icon-checkbox" for="location5"><i class="fa-solid fa-check"></i></label>
              <label class="inner-locations" for="location5">Xóa sản phẩm</label>
            </div>
          </div>
        </div>
        <div class="inner-button-2 inner-two-col">
          <button>Tạo mới</button>
        </div>
      </form>
      <div class="inner-back"><a href="role-list.html">Quay lại danh sách </a></div>
    </div>
  </main>
  <script
    src="https://unpkg.com/filepond-plugin-file-validate-type/dist/filepond-plugin-file-validate-type.js"> </script>
  <script src="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.js"> </script>
  <script src="https://unpkg.com/filepond@^4/dist/filepond.js"> </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"> </script>
  <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"> </script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"> </script>
  <script src="assets/dashboard/js/nqh-script.js"> </script>
</body>

</html>
